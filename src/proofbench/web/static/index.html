<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Proofbench Workbench</title>
<style>
  :root {
    --navy: #17324d; --teal: #1e7a78; --pale: #eaf3f2; --ink: #24313d;
    --muted: #65737e; --line: #d7e0e5; --bg: #f6f8fa; --red: #a4372e; --amber: #a5750c;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: var(--bg); }
  header { background: var(--navy); color: white; padding: 14px 20px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: 0.02em; }
  header select { background: #ffffff22; color: white; border: 1px solid #ffffff44; border-radius: 4px; padding: 4px 8px; }
  nav { display: flex; gap: 4px; background: white; border-bottom: 1px solid var(--line); padding: 0 20px; }
  nav button { border: none; background: none; padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
  nav button.active { color: var(--teal); border-bottom-color: var(--teal); }
  main { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }
  .cards { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .card { background: white; border: 1px solid var(--line); border-radius: 6px; padding: 10px 16px; min-width: 100px; }
  .card .n { font-size: 22px; font-weight: 700; }
  .card .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
  table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  th, td { text-align: left; padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--line); }
  th { background: var(--navy); color: white; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover { background: var(--pale); }
  .status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .status.supported { background: #e3f3e1; color: #2b6b26; }
  .status.contradicted { background: #fbe5e2; color: var(--red); }
  .status.ambiguous, .status.outdated { background: #fdf1dc; color: var(--amber); }
  .status.missing_evidence { background: #ececec; color: var(--muted); }
  .status.pending { background: #eef3fb; color: #345; }
  .status.failed { background: #fbe5e2; color: var(--red); }
  .status.succeeded { background: #e3f3e1; color: #2b6b26; }
  .status.running { background: #eef3fb; color: #345; }
  .status.skipped_budget { background: #fdf1dc; color: var(--amber); }
  .status.manager { background: var(--navy); color: white; }
  tr.manager-row { background: var(--pale); font-weight: 600; }
  tr.manager-row:hover { background: #dcece9; }
  .orchestration-summary { border: 1px solid var(--teal); background: var(--pale); border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; }
  .orchestration-summary h3 { margin: 0 0 8px 0; font-size: 13px; color: var(--teal); }
  .job-outcome-row.clickable { cursor: pointer; }
  .job-outcome-row.clickable:hover { background: var(--pale); }
  .panel { background: white; border: 1px solid var(--line); border-radius: 6px; padding: 16px; margin-top: 16px; }
  .panel h3 { margin-top: 0; font-size: 14px; color: var(--teal); }
  .kv { display: grid; grid-template-columns: 160px 1fr; gap: 4px 12px; font-size: 13px; margin-bottom: 12px; }
  .kv div:nth-child(odd) { color: var(--muted); }
  .mono { font-family: "SF Mono", Consolas, monospace; font-size: 12px; background: #f6f8fa; padding: 6px 8px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
  .trace-entry { border: 1px solid var(--line); border-radius: 4px; margin-bottom: 8px; padding: 8px 10px; }
  .trace-entry .tool-name { font-weight: 700; font-size: 12px; color: var(--navy); }
  .trace-entry.error { border-color: var(--red); }
  .mono.io { max-height: 280px; overflow: auto; margin-top: 2px; }
  .io-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-top: 6px; }
  details.io-details { margin-top: 6px; }
  details.io-details summary { cursor: pointer; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
  .muted { color: var(--muted); font-size: 12px; }
  .back-link { cursor: pointer; color: var(--teal); font-size: 13px; font-weight: 600; }
  .refresh-indicator { font-size: 11px; color: var(--muted); margin-left: auto; }
  .source-link { display: inline-block; margin: 2px 6px 2px 0; padding: 3px 9px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; }
  .doc-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .doc-toolbar select, .doc-toolbar button { font-size: 13px; padding: 5px 8px; border: 1px solid var(--line); border-radius: 4px; background: white; }
  .doc-toolbar button { cursor: pointer; }
  .doc-stage { position: relative; display: inline-block; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: white; }
  .doc-stage img { display: block; max-width: 100%; height: auto; }
  .highlight-box { position: absolute; border: 2px solid; border-radius: 2px; cursor: pointer; background: rgba(255,255,255,0.05); transition: background 0.1s; }
  .highlight-box:hover { background-color: rgba(30,122,120,0.18); }
  .highlight-box.supported { border-color: #2b6b26; }
  .highlight-box.contradicted { border-color: var(--red); }
  .highlight-box.ambiguous, .highlight-box.outdated { border-color: var(--amber); }
  .highlight-box.missing_evidence, .highlight-box.pending { border-color: var(--muted); }
  .highlight-box.failed { border-color: var(--red); }
  .doc-side { display: flex; gap: 16px; align-items: flex-start; }
  .doc-page-col { flex: 1; min-width: 0; }
  .doc-info-col { width: 320px; flex-shrink: 0; }
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before { content: ""; position: absolute; left: 6px; top: 8px; bottom: 8px; width: 2px; background: var(--line); }
  .timeline-event { position: relative; margin-bottom: 8px; }
  .timeline-event::before { content: ""; position: absolute; left: -24px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--navy); border: 2px solid white; box-shadow: 0 0 0 2px var(--line); }
  .timeline-event.manager-event::before { background: var(--teal); }
  .job-card { background: white; border: 1px solid var(--line); border-radius: 6px; padding: 10px 14px; margin-bottom: 6px; }
  .job-card.failed { border-left: 3px solid var(--red); }
  .job-card.succeeded { border-left: 3px solid #2b6b26; }
  .job-card-header { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .job-card-header .job-title { font-weight: 700; font-size: 13px; flex: 1; }
  .job-card-body { margin-top: 10px; display: none; }
  .job-card.expanded .job-card-body { display: block; }
  .job-card-body .final-answer { background: #f6f8fa; border-radius: 4px; padding: 8px 10px; font-family: "SF Mono", Consolas, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; margin-top: 8px; }
  .expand-caret { font-size: 10px; color: var(--muted); }
  .history-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--line); }
  .history-tab { border: none; background: none; padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
  .history-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
</style>
</head>
<body>
<header>
  <h1>PROOFBENCH</h1>
  <select id="audit-select"></select>
  <span class="refresh-indicator" id="refresh-indicator"></span>
</header>
<nav>
  <button data-view="audit" class="active">Audit</button>
  <button data-view="vault">Vault</button>
  <button data-view="document">Document</button>
  <button data-view="runs">Agent Runs</button>
  <button data-view="history">History</button>
  <button data-view="eval">Eval</button>
</nav>
<main>
  <section id="view-audit" class="view active">
    <div class="cards" id="coverage-cards"></div>
    <table>
      <thead><tr><th>Claim</th><th>Label</th><th>Value</th><th>Entity / Period</th><th>Status</th></tr></thead>
      <tbody id="claims-body"></tbody>
    </table>
    <div id="claim-panel"></div>
  </section>

  <section id="view-vault" class="view">
    <table>
      <thead><tr><th>Document</th><th>Kind</th><th>Tag</th><th>Format</th><th>Spans</th><th>Facts</th><th></th></tr></thead>
      <tbody id="vault-body"></tbody>
    </table>
    <div id="facts-panel"></div>
  </section>

  <section id="view-document" class="view">
    <div class="doc-toolbar">
      <select id="doc-select"></select>
      <button id="doc-prev">‹ prev page</button>
      <span id="doc-page-label" class="muted"></span>
      <button id="doc-next">next page ›</button>
    </div>
    <div class="doc-side">
      <div class="doc-page-col">
        <div class="doc-stage" id="doc-stage"></div>
        <div id="doc-not-renderable" class="muted" style="margin-top: 8px;"></div>
      </div>
      <div class="doc-info-col">
        <div class="panel" id="doc-highlight-info">
          <div class="muted">Click a highlighted box to see what it is and jump to the claim or its evidence.</div>
        </div>
      </div>
    </div>
  </section>

  <section id="view-runs" class="view">
    <div id="orchestration-summary"></div>
    <table>
      <thead><tr><th>Run</th><th>Agent</th><th>Status</th><th>Model</th><th>Cost</th><th>Tools called</th><th>Started</th></tr></thead>
      <tbody id="runs-body"></tbody>
    </table>
    <div id="run-panel"></div>
  </section>

  <section id="view-history" class="view">
    <div class="history-tabs" id="history-tabs"></div>
    <div id="history-content"></div>
  </section>

  <section id="view-eval" class="view">
    <div class="doc-toolbar">
      <select id="eval-select"></select>
      <span class="muted">experiments live in runs/experiments/ and never touch real audit state</span>
    </div>
    <div id="eval-content"></div>
    <div id="eval-claim-panel"></div>
  </section>
</main>

<script>
const state = { auditId: null, view: "audit", doc: { docId: null, page: 1, pagesMeta: [] }, historyRunId: null, historyRole: null, historyExpanded: new Set(), evalExpId: null };

async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${path} -> ${res.status}`);
  return res.json();
}

function statusBadge(status) {
  return `<span class="status ${status}">${status.replace("_", " ")}</span>`;
}

function fmtCost(v) {
  return v == null ? "–" : `$${v.toFixed(4)}`;
}

function fmtTime(v) {
  return v ? new Date(v).toLocaleTimeString() : "–";
}

function escHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function unwrapToolPayload(v) {
  // MCP tool results arrive as content blocks [{type:"text", text:"..."}],
  // usually with JSON escaped inside the text -- unwrap both layers so the
  // trace shows the actual payload, not the transport envelope.
  if (Array.isArray(v) && v.length && v.every(b => b && b.type === "text")) {
    v = v.map(b => b.text).join("\n");
  }
  if (typeof v === "string") {
    try { return JSON.parse(v); } catch { return v; }
  }
  return v;
}

function toolIO(label, v) {
  if (v == null) return "";
  v = unwrapToolPayload(v);
  const compact = typeof v === "string" ? v : JSON.stringify(v);
  const text = typeof v === "string" || compact.length <= 100 ? compact : JSON.stringify(v, null, 2);
  const body = `<div class="mono io">${escHtml(text)}</div>`;
  const lines = text.split("\n").length;
  return lines > 14 || text.length > 900
    ? `<details class="io-details"><summary>${label} · ${lines} lines</summary>${body}</details>`
    : `<div class="io-label">${label}</div>${body}`;
}

async function loadAudits() {
  const audits = await api("/api/audits");
  const select = document.getElementById("audit-select");
  const prev = state.auditId;
  select.innerHTML = audits.map(a => `<option value="${a.audit_id}">${a.audit_id} (${a.claim_count} claims)</option>`).join("");
  if (audits.length === 0) return;
  state.auditId = prev && audits.some(a => a.audit_id === prev) ? prev : audits[0].audit_id;
  select.value = state.auditId;
}

async function loadAuditView() {
  if (!state.auditId) return;
  const detail = await api(`/api/audits/${state.auditId}`);
  const cards = document.getElementById("coverage-cards");
  cards.innerHTML = Object.entries(detail.coverage).map(([status, n]) =>
    `<div class="card"><div class="n">${n}</div><div class="l">${status.replace("_", " ")}</div></div>`
  ).join("") || `<div class="muted">No claims extracted yet.</div>`;

  const claims = await api(`/api/audits/${state.auditId}/claims`);
  const body = document.getElementById("claims-body");
  body.innerHTML = claims.map(c => `
    <tr class="clickable" data-claim="${c.claim_id.split('/').pop()}">
      <td>${c.claim_id.split('/').pop()}</td>
      <td>${c.label}</td>
      <td>${c.canonical_value} ${c.unit}</td>
      <td>${c.entity} / ${c.time_scope}</td>
      <td>${statusBadge(c.effective_status)}</td>
    </tr>
  `).join("");
  body.querySelectorAll("tr.clickable").forEach(tr =>
    tr.addEventListener("click", () => showClaim(tr.dataset.claim))
  );
}

async function showClaim(claimSuffix) {
  const d = await api(`/api/audits/${state.auditId}/claims/${claimSuffix}`);
  const panel = document.getElementById("claim-panel");
  const statusClass = d.effective_status;
  const evidenceHtml = d.evidence.length
    ? d.evidence.map((e, i) => `
        <div class="trace-entry">
          <div class="tool-name">${e.doc_id}${e.page != null ? " p." + e.page : ""}</div>
          <div class="mono">${e.span_text || ""}</div>
          <div class="muted">value: ${e.canonical_value ?? "–"} ${e.unit || ""} | role: ${e.role} | confidence: ${e.extractor_confidence}</div>
          ${e.page != null ? `<a class="source-link status ${statusClass}" href="#" onclick="viewSourceFromClaim(event, '${e.doc_id}', ${e.page})">view in document ↗</a>` : `<span class="muted">(spreadsheet -- no page view)</span>`}
        </div>`).join("")
    : `<div class="muted">No evidence recorded.</div>`;

  const masterLink = d.claim.source_page != null
    ? `<a class="source-link status ${statusClass}" href="#" onclick="viewSourceFromClaim(event, '${d.claim.source_doc_id}', ${d.claim.source_page})">view claim in master document ↗</a>`
    : "";

  panel.innerHTML = `
    <div class="panel">
      <span class="back-link" onclick="document.getElementById('claim-panel').innerHTML=''">✕ close</span>
      <h3>${d.claim.label} ${statusBadge(d.effective_status)}</h3>
      <div class="kv">
        <div>Raw text</div><div>${d.claim.raw_text}</div>
        <div>Source</div><div>${d.claim.source_doc_id} ${d.claim.source_page ? "p." + d.claim.source_page : ""}</div>
        <div>Expected evidence</div><div>${d.claim.expected_evidence_type ?? "–"}</div>
      </div>
      ${masterLink}
      ${d.verdict ? `
        <div class="kv">
          <div>Rationale</div><div>${d.verdict.rationale}</div>
          <div>Delta</div><div>${d.verdict.delta ?? "–"}</div>
          <div>Confidence</div><div>${d.verdict.confidence}</div>
          <div>Suggested action</div><div>${d.verdict.suggested_action ?? "–"}</div>
          <div>Produced by run</div><div><a href="#" onclick="viewRunFromClaim(event)" data-run="${d.verdict.produced_by_run_id}">${d.verdict.produced_by_run_id}</a></div>
        </div>
      ` : `<div class="muted">Not yet verified.</div>`}
      <h3>Evidence &amp; sources</h3>
      ${evidenceHtml}
    </div>
  `;
}

function viewRunFromClaim(evt) {
  evt.preventDefault();
  const runId = evt.target.dataset.run;
  document.querySelector('nav button[data-view="runs"]').click();
  showRun(runId);
}

function viewSourceFromClaim(evt, docId, page) {
  evt.preventDefault();
  document.querySelector('nav button[data-view="document"]').click();
  state.doc.docId = docId;
  state.doc.page = page;
  loadDocumentView();
}

async function loadVaultView() {
  if (!state.auditId) return;
  const d = await api(`/api/audits/${state.auditId}/vault`);
  const body = document.getElementById("vault-body");
  body.innerHTML = d.documents.map(doc => `
    <tr class="clickable" data-doc="${doc.doc_id}">
      <td>${doc.doc_id}</td>
      <td>${doc.kind}</td>
      <td>${doc.tag ?? "–"}</td>
      <td>${doc.format}</td>
      <td>${doc.span_count ?? "–"}</td>
      <td>${doc.fact_count ?? "–"}</td>
      <td>${doc.fact_count ? `<a href="#" class="back-link" onclick="event.stopPropagation(); showFacts('${doc.doc_id}')">view facts ↓</a>` : ""}</td>
    </tr>
  `).join("");
  body.querySelectorAll("tr.clickable").forEach(tr =>
    tr.addEventListener("click", () => {
      document.querySelector('nav button[data-view="document"]').click();
      state.doc.docId = tr.dataset.doc;
      state.doc.page = 1;
      loadDocumentView();
    })
  );
}

async function showFacts(docId) {
  const facts = await api(`/api/audits/${state.auditId}/docs/${docId}/facts`);
  const panel = document.getElementById("facts-panel");
  panel.innerHTML = `
    <div class="panel">
      <span class="back-link" onclick="document.getElementById('facts-panel').innerHTML=''">✕ close</span>
      <h3>Facts — ${docId} (${facts.length})</h3>
      <table>
        <thead><tr><th>Entity</th><th>Attribute</th><th>Value</th><th>Location</th></tr></thead>
        <tbody>
          ${facts.map(f => `
            <tr><td>${f.entity}</td><td>${f.attribute}</td><td>${f.value}</td><td class="muted">${f.location}</td></tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

async function loadDocumentView() {
  if (!state.auditId) return;
  const detail = await api(`/api/audits/${state.auditId}`);
  const select = document.getElementById("doc-select");
  if (!state.doc.docId) state.doc.docId = detail.master_doc_id;
  select.innerHTML = detail.documents.map(doc =>
    `<option value="${doc.doc_id}" ${doc.doc_id === state.doc.docId ? "selected" : ""}>${doc.doc_id}${doc.doc_id === detail.master_doc_id ? " (master)" : ""}</option>`
  ).join("");

  const pagesResp = await api(`/api/audits/${state.auditId}/docs/${state.doc.docId}/pages`);
  state.doc.pagesMeta = pagesResp.pages;
  const notRenderable = document.getElementById("doc-not-renderable");
  const stage = document.getElementById("doc-stage");
  const pageLabel = document.getElementById("doc-page-label");

  if (pagesResp.format !== "pdf" || pagesResp.pages.length === 0) {
    stage.innerHTML = "";
    notRenderable.textContent = `"${state.doc.docId}" is a ${pagesResp.format} document -- page rendering isn't supported for this format. See evidence text in the Audit view's claim panel instead.`;
    pageLabel.textContent = "";
    return;
  }
  notRenderable.textContent = "";

  if (state.doc.page > pagesResp.pages.length) state.doc.page = 1;
  const pageMeta = pagesResp.pages[state.doc.page - 1];
  pageLabel.textContent = `page ${state.doc.page} / ${pagesResp.pages.length}`;

  const highlights = await api(`/api/audits/${state.auditId}/docs/${state.doc.docId}/highlights?page=${state.doc.page}`);
  const imgUrl = `/api/audits/${state.auditId}/docs/${state.doc.docId}/page/${state.doc.page}.png`;

  stage.innerHTML = `<img id="doc-page-img" src="${imgUrl}" alt="page ${state.doc.page}"><div id="doc-overlay"></div>`;
  const img = document.getElementById("doc-page-img");
  const drawOverlay = () => {
    const scale = img.clientWidth / pageMeta.width;
    const overlay = document.getElementById("doc-overlay");
    overlay.style.position = "absolute";
    overlay.style.left = "0"; overlay.style.top = "0";
    overlay.style.width = img.clientWidth + "px";
    overlay.style.height = img.clientHeight + "px";
    overlay.innerHTML = highlights.map((h, i) => `
      <div class="highlight-box ${h.status}" data-idx="${i}" style="
        left: ${h.bbox[0] * scale}px; top: ${h.bbox[1] * scale}px;
        width: ${(h.bbox[2] - h.bbox[0]) * scale}px; height: ${(h.bbox[3] - h.bbox[1]) * scale}px;
      "></div>
    `).join("");
    overlay.querySelectorAll(".highlight-box").forEach(box =>
      box.addEventListener("click", () => showHighlightInfo(highlights[parseInt(box.dataset.idx)]))
    );
  };
  if (img.complete) drawOverlay(); else img.addEventListener("load", drawOverlay);
}

function showHighlightInfo(h) {
  const panel = document.getElementById("doc-highlight-info");
  if (h.kind === "claim") {
    panel.innerHTML = `
      <h3>Claim ${statusBadge(h.status)}</h3>
      <div class="kv">
        <div>Label</div><div>${h.label}</div>
        <div>Value</div><div>${h.canonical_value} ${h.unit}</div>
        <div>Raw text</div><div>${h.raw_text}</div>
      </div>
      <a class="source-link status ${h.status}" href="#" onclick="jumpToClaimFromDoc(event, '${h.claim_id.split('/').pop()}')">view full claim &amp; evidence ↗</a>
    `;
  } else {
    panel.innerHTML = `
      <h3>Evidence ${statusBadge(h.status)}</h3>
      <div class="kv">
        <div>Span text</div><div>${h.span_text}</div>
        <div>Value</div><div>${h.canonical_value ?? "–"} ${h.unit || ""}</div>
      </div>
      <a class="source-link status ${h.status}" href="#" onclick="jumpToClaimFromDoc(event, '${h.claim_id.split('/').pop()}')">view claim this supports/contradicts ↗</a>
    `;
  }
}

function jumpToClaimFromDoc(evt, claimSuffix) {
  evt.preventDefault();
  document.querySelector('nav button[data-view="audit"]').click();
  showClaim(claimSuffix);
}

async function loadRunsView() {
  const runs = await api(`/api/runs?audit_id=${state.auditId || ""}`);
  const body = document.getElementById("runs-body");
  body.innerHTML = runs.map(r => `
    <tr class="clickable ${r.agent_role === "manager" ? "manager-row" : ""}" data-run="${r.run_id}">
      <td>${r.run_id.split('/').pop()}</td>
      <td>${r.agent_role}</td>
      <td>${statusBadge(r.status)}</td>
      <td>${r.model}</td>
      <td>${fmtCost(r.cost_usd)}</td>
      <td>${r.tool_call_count}</td>
      <td>${fmtTime(r.started_at)}</td>
    </tr>
  `).join("");
  body.querySelectorAll("tr.clickable").forEach(tr =>
    tr.addEventListener("click", () => showRun(tr.dataset.run))
  );

  const summaryEl = document.getElementById("orchestration-summary");
  const latestManagerRun = runs.find(r => r.agent_role === "manager");
  if (!latestManagerRun) {
    summaryEl.innerHTML = "";
    return;
  }
  const full = await api(`/api/runs/${encodeURIComponent(latestManagerRun.run_id)}`);
  const outcomes = full.job_outcomes || [];
  const counts = outcomes.reduce((acc, o) => { acc[o.status] = (acc[o.status] || 0) + 1; return acc; }, {});
  summaryEl.innerHTML = `
    <div class="orchestration-summary">
      <h3>Latest orchestration — ${full.run_id.split('/').pop()}</h3>
      <div class="kv">
        <div>Scheduled</div><div>${outcomes.length} jobs, max_concurrency=${full.max_concurrency ?? "–"}, max_budget_usd=${full.max_budget_usd ?? "unlimited"}</div>
        <div>Outcomes</div><div>${Object.entries(counts).map(([s, n]) => `${n} ${s}`).join(", ") || "–"}</div>
        <div>Total cost</div><div>${fmtCost(full.cost_usd)}</div>
        <div>Duration</div><div>${full.started_at} → ${full.finished_at ?? "running"}</div>
      </div>
      <a class="back-link" href="#" onclick="event.preventDefault(); showRun('${full.run_id}');">view full orchestration record ↓</a>
    </div>
  `;
}

async function showRun(runId) {
  const r = await api(`/api/runs/${encodeURIComponent(runId)}`);
  const panel = document.getElementById("run-panel");

  if (r.agent_role === "manager") {
    showManagerRun(r, panel);
    return;
  }

  const trace = (r.tool_trace || []).map(t => `
    <div class="trace-entry ${t.is_error ? "error" : ""}">
      <div class="tool-name">#${t.seq} ${t.tool}</div>
      <div class="muted">${t.at}</div>
      ${toolIO("input", t.input)}
      ${toolIO("output", t.output)}
    </div>
  `).join("") || `<div class="muted">No tool calls recorded.</div>`;

  panel.innerHTML = `
    <div class="panel">
      <span class="back-link" onclick="document.getElementById('run-panel').innerHTML=''">✕ close</span>
      <h3>${r.run_id} ${statusBadge(r.status)}</h3>
      <div class="kv">
        <div>Agent role</div><div>${r.agent_role}</div>
        <div>Model</div><div>${r.model}</div>
        <div>Cost</div><div>${fmtCost(r.cost_usd)}</div>
        <div>Started</div><div>${r.started_at}</div>
        <div>Finished</div><div>${r.finished_at ?? "–"}</div>
        <div>Input refs</div><div>${(r.input_refs || []).join(", ")}</div>
        <div>Output refs</div><div>${(r.output_refs || []).join(", ") || "–"}</div>
        ${r.error ? `<div>Error</div><div class="mono">${r.error}</div>` : ""}
      </div>
      <h3>Tool trace</h3>
      ${trace}
      <h3>System prompt</h3>
      <div class="mono">${r.prompt ?? ""}</div>
    </div>
  `;
}

function showManagerRun(r, panel) {
  const outcomes = r.job_outcomes || [];
  const counts = outcomes.reduce((acc, o) => { acc[o.status] = (acc[o.status] || 0) + 1; return acc; }, {});
  panel.innerHTML = `
    <div class="panel">
      <span class="back-link" onclick="document.getElementById('run-panel').innerHTML=''">✕ close</span>
      <h3>Orchestration: ${r.run_id} ${statusBadge(r.status)}</h3>
      <div class="kv">
        <div>Jobs scheduled</div><div>${outcomes.length}</div>
        <div>Max concurrency</div><div>${r.max_concurrency ?? "–"}</div>
        <div>Max budget</div><div>${r.max_budget_usd != null ? "$" + r.max_budget_usd : "unlimited"}</div>
        <div>Outcomes</div><div>${Object.entries(counts).map(([s, n]) => `${n} ${s}`).join(", ") || "–"}</div>
        <div>Total cost</div><div>${fmtCost(r.cost_usd)}</div>
        <div>Started</div><div>${r.started_at}</div>
        <div>Finished</div><div>${r.finished_at ?? "–"}</div>
      </div>
      <h3>Job outcomes (in scheduling order)</h3>
      <table>
        <thead><tr><th>Job</th><th>Status</th><th>Cost</th><th>Run</th></tr></thead>
        <tbody>
          ${outcomes.map(o => `
            <tr class="job-outcome-row clickable" data-run="${o.run_id}">
              <td>${o.job_id.split('/').pop()}</td>
              <td>${statusBadge(o.status)}</td>
              <td>${fmtCost(o.cost_usd)}</td>
              <td class="muted">${o.run_id.split('/').pop()}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
  panel.querySelectorAll(".job-outcome-row").forEach(tr =>
    tr.addEventListener("click", () => showRun(tr.dataset.run))
  );
}

function switchView(view) {
  state.view = view;
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b.dataset.view === view));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === `view-${view}`));
  refresh();
}

async function refresh() {
  const indicator = document.getElementById("refresh-indicator");
  try {
    await loadAudits();
    if (state.view === "audit") await loadAuditView();
    if (state.view === "vault") await loadVaultView();
    if (state.view === "document") await loadDocumentView();
    if (state.view === "runs") await loadRunsView();
    if (state.view === "history") await loadHistoryView();
    if (state.view === "eval") await loadEvalView();
    indicator.textContent = `updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    indicator.textContent = `error: ${e.message}`;
  }
}

const HISTORY_ROLE_LABELS = { claim_extractor: "Claim Extractor", verifier: "Verifier" };

function historyRoleOf(runId) {
  // manager run_ids look like "<audit_id>/manage-<agent_role>-<timestamp>"
  const m = runId.match(/manage-(.+)-\d{8}T\d{6}Z$/);
  return m ? m[1] : "unknown";
}

async function loadHistoryView() {
  if (!state.auditId) return;
  const runs = await api(`/api/runs?audit_id=${state.auditId}`);
  const managerRuns = runs.filter(r => r.agent_role === "manager"); // API returns these newest-first
  const tabsEl = document.getElementById("history-tabs");
  const content = document.getElementById("history-content");

  if (managerRuns.length === 0) {
    tabsEl.innerHTML = "";
    content.innerHTML = `<div class="muted">No orchestration runs yet -- run \`proofbench extract\` or \`proofbench verify\`.</div>`;
    return;
  }

  // One tab per agent role that has run at least once; each tab shows
  // that role's most recent orchestration run.
  const latestByRole = {};
  for (const r of managerRuns) {
    const role = historyRoleOf(r.run_id);
    if (!(role in latestByRole)) latestByRole[role] = r;
  }
  const roles = Object.keys(latestByRole);
  if (!state.historyRole || !roles.includes(state.historyRole)) {
    state.historyRole = roles[0];
  }

  tabsEl.innerHTML = roles.map(role => `
    <button class="history-tab ${role === state.historyRole ? "active" : ""}" data-role="${role}">
      ${HISTORY_ROLE_LABELS[role] || role}
    </button>
  `).join("");
  tabsEl.querySelectorAll(".history-tab").forEach(btn =>
    btn.addEventListener("click", () => {
      state.historyRole = btn.dataset.role;
      state.historyExpanded.clear();
      loadHistoryView();
    })
  );

  state.historyRunId = latestByRole[state.historyRole].run_id;
  const data = await api(`/api/history/${encodeURIComponent(state.historyRunId)}`);
  renderHistory(data, content);
}

function renderHistory(data, content) {
  const mgr = data.manager;
  const jobs = data.jobs;

  const batchAgentRole = jobs[0]?.manifest?.agent_role ?? "worker";
  const managerStartHtml = `
    <div class="timeline-event manager-event">
      <div class="job-card">
        <strong>Orchestrator started</strong> —
        scheduling ${jobs.length} ${batchAgentRole} job(s), max_concurrency=${mgr.max_concurrency ?? "–"}, max_budget_usd=${mgr.max_budget_usd ?? "unlimited"}
        <div class="muted">${mgr.started_at}</div>
      </div>
    </div>
  `;

  const jobCardsHtml = jobs.map(j => {
    const m = j.manifest;
    const expanded = state.historyExpanded.has(j.run_id);
    const agentLabel = m ? m.agent_role : "?";
    const jobLabel = j.job_id.split("/").pop();
    const claimLink = j.job_id.includes("/claim-")
      ? `<a href="#" onclick="event.stopPropagation(); jumpToClaimFromDoc(event, '${jobLabel}')">view claim ↗</a>` : "";

    let body = "";
    if (!m) {
      body = `<div class="muted">Skipped by budget before it could run.</div>`;
    } else {
      const traceHtml = (m.tool_trace || []).map(t => `
        <div class="trace-entry ${t.is_error ? "error" : ""}">
          <div class="tool-name">🔧 ${t.tool}</div>
          <div class="muted">${t.at}</div>
          ${toolIO("input", t.input)}
          ${toolIO("output", t.output)}
        </div>
      `).join("") || `<div class="muted">No tool calls recorded before this job ended.</div>`;
      const finalHtml = m.final_text
        ? `<div class="muted" style="margin-top:8px;">Final answer:</div><div class="final-answer">${m.final_text}</div>`
        : "";
      const errorHtml = m.error ? `<div class="muted" style="margin-top:8px;">Error:</div><div class="final-answer">${m.error}</div>` : "";
      body = traceHtml + finalHtml + errorHtml;
    }

    return `
      <div class="timeline-event">
        <div class="job-card ${j.outcome_status} ${expanded ? "expanded" : ""}" data-run="${j.run_id}">
          <div class="job-card-header" onclick="toggleHistoryJob('${j.run_id}')">
            <span class="expand-caret">${expanded ? "▼" : "▶"}</span>
            <span class="job-title">${agentLabel} spawned for ${jobLabel}</span>
            ${statusBadge(j.outcome_status)}
            <span class="muted">${fmtCost(j.cost_usd)}</span>
            <span class="muted">${m ? fmtTime(m.started_at) + " → " + fmtTime(m.finished_at) : ""}</span>
            ${claimLink}
          </div>
          <div class="job-card-body">${body}</div>
        </div>
      </div>
    `;
  }).join("");

  const managerEndHtml = `
    <div class="timeline-event manager-event">
      <div class="job-card">
        <strong>Orchestrator finished</strong> — ${mgr.job_outcomes.filter(o => o.status === "succeeded").length} succeeded,
        ${mgr.job_outcomes.filter(o => o.status === "failed").length} failed,
        ${mgr.job_outcomes.filter(o => o.status === "skipped_budget").length} skipped by budget,
        total cost ${fmtCost(mgr.cost_usd)}
        <div class="muted">${mgr.finished_at ?? "still running"}</div>
      </div>
    </div>
  `;

  content.innerHTML = `<div class="timeline">${managerStartHtml}${jobCardsHtml}${managerEndHtml}</div>`;
}

function toggleHistoryJob(runId) {
  if (state.historyExpanded.has(runId)) state.historyExpanded.delete(runId);
  else state.historyExpanded.add(runId);
  const card = document.querySelector(`.job-card[data-run="${CSS.escape(runId)}"]`);
  if (card) {
    card.classList.toggle("expanded");
    const caret = card.querySelector(".expand-caret");
    if (caret) caret.textContent = card.classList.contains("expanded") ? "▼" : "▶";
  }
}

async function loadEvalView() {
  if (!state.auditId) return;
  const experiments = await api(`/api/experiments?audit_id=${state.auditId}`);
  const select = document.getElementById("eval-select");
  const content = document.getElementById("eval-content");
  if (experiments.length === 0) {
    select.innerHTML = "";
    content.innerHTML = `<div class="muted">No experiments yet -- run \`proofbench eval ${state.auditId}\`.</div>`;
    return;
  }
  const prev = state.evalExpId;
  select.innerHTML = experiments.map(e =>
    `<option value="${e.experiment_id}">${e.experiment_id} — ${e.variants.join(" vs ")} — ${fmtCost(e.total_cost_usd)}</option>`
  ).join("");
  state.evalExpId = prev && experiments.some(e => e.experiment_id === prev) ? prev : experiments[0].experiment_id;
  select.value = state.evalExpId;

  const detail = await api(`/api/experiments/${encodeURIComponent(state.evalExpId)}`);
  renderEval(detail, content);
}

function renderEval(detail, content) {
  const summaries = detail.report.summaries;
  const variants = summaries.map(s => s.variant);

  const summaryTable = `
    <table style="margin-bottom: 16px;">
      <thead><tr><th>Variant</th><th>Accuracy</th><th>Correct</th><th>Failures</th><th>Avg tools</th><th>Avg cost</th><th>Total cost</th></tr></thead>
      <tbody>
        ${summaries.map(s => `
          <tr>
            <td><b>${s.variant}</b>${s.skipped ? ` <span class="status skipped_budget">skipped</span>` : ""}</td>
            <td>${s.accuracy != null ? (s.accuracy * 100).toFixed(0) + "%" : "–"}</td>
            <td>${s.correct}/${s.n_claims}</td>
            <td>${s.failures}</td>
            <td>${s.avg_tool_calls != null ? s.avg_tool_calls.toFixed(1) : "–"}</td>
            <td>${fmtCost(s.avg_cost_usd)}</td>
            <td>${fmtCost(s.total_cost_usd)}${s.enrichment_cost_usd != null ? ` <span class="muted">+ ${fmtCost(s.enrichment_cost_usd)} enrichment</span>` : ""}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>`;

  // one row per claim, one column group per variant, so variants read
  // side-by-side on the same claim
  const byVC = {};
  const claimIds = [];
  for (const v of variants) {
    for (const row of detail.claims_by_variant[v] || []) {
      byVC[`${v}|${row.claim_id}`] = row;
      if (!claimIds.includes(row.claim_id)) claimIds.push(row.claim_id);
    }
  }

  const cell = (v, claimId) => {
    const r = byVC[`${v}|${claimId}`];
    if (!r) return `<td class="muted">–</td>`;
    const suffix = claimId.split("/").pop();
    const badge = r.error
      ? `<span class="status failed">failed</span>`
      : `${statusBadge(r.status)} ${r.correct ? "✓" : "✗"}`;
    const meta = r.tool_calls != null ? `${r.tool_calls} tools · ${fmtCost(r.cost_usd)}` : "";
    return `<td class="clickable" style="cursor: pointer;" onclick="showEvalClaim('${v}', '${suffix}')">${badge}<div class="muted">${meta}</div></td>`;
  };

  const matrix = `
    <table>
      <thead><tr><th>Claim</th><th>Expected</th>${variants.map(v => `<th>${v}</th>`).join("")}</tr></thead>
      <tbody>
        ${claimIds.map(claimId => {
          const any = variants.map(v => byVC[`${v}|${claimId}`]).find(Boolean);
          return `<tr>
            <td>${claimId.split("/").pop()}</td>
            <td>${any && any.expected_status ? statusBadge(any.expected_status) : "–"}</td>
            ${variants.map(v => cell(v, claimId)).join("")}
          </tr>`;
        }).join("")}
      </tbody>
    </table>
    <div class="muted" style="margin-top: 8px;">Click a cell to see that variant's full tool trace for the claim.</div>`;

  content.innerHTML = summaryTable + matrix;
}

async function showEvalClaim(variant, claimSuffix) {
  const r = await api(`/api/experiments/${encodeURIComponent(state.evalExpId)}/${encodeURIComponent(variant)}/${encodeURIComponent(claimSuffix)}`);
  const panel = document.getElementById("eval-claim-panel");

  const trace = (r.tool_trace || []).map(t => `
    <div class="trace-entry ${t.is_error ? "error" : ""}">
      <div class="tool-name">#${t.seq} ${t.tool}</div>
      ${toolIO("input", t.input)}
      ${toolIO("output", t.output)}
    </div>
  `).join("") || `<div class="muted">No tool calls recorded.</div>`;

  panel.innerHTML = `
    <div class="panel">
      <span class="back-link" onclick="document.getElementById('eval-claim-panel').innerHTML=''">✕ close</span>
      <h3>${r.claim_id.split("/").pop()} — variant: ${r.variant}</h3>
      <div class="kv">
        <div>Expected</div><div>${r.expected_status ? statusBadge(r.expected_status) : "–"}</div>
        <div>Got</div><div>${r.status ? statusBadge(r.status) : "–"} ${r.correct ? "✓ correct" : "✗"}</div>
        <div>Tool calls</div><div>${r.tool_calls ?? "–"}</div>
        <div>Cost</div><div>${fmtCost(r.cost_usd)}</div>
        ${r.verdict ? `<div>Rationale</div><div>${r.verdict.rationale}</div>` : ""}
        ${r.error ? `<div>Error</div><div class="mono">${r.error}</div>` : ""}
      </div>
      <h3>Tool trace</h3>
      ${trace}
      ${r.final_text ? `<h3>Final answer</h3><div class="mono">${r.final_text.replace(/</g, "&lt;")}</div>` : ""}
    </div>
  `;
  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

document.querySelectorAll("nav button").forEach(b =>
  b.addEventListener("click", () => switchView(b.dataset.view))
);
document.getElementById("audit-select").addEventListener("change", e => {
  state.auditId = e.target.value;
  state.doc.docId = null;
  state.historyRunId = null;
  state.historyRole = null;
  state.evalExpId = null;
  refresh();
});
document.getElementById("eval-select").addEventListener("change", e => {
  state.evalExpId = e.target.value;
  document.getElementById("eval-claim-panel").innerHTML = "";
  loadEvalView();
});
document.getElementById("doc-select").addEventListener("change", e => {
  state.doc.docId = e.target.value;
  state.doc.page = 1;
  loadDocumentView();
});
document.getElementById("doc-prev").addEventListener("click", () => {
  if (state.doc.page > 1) { state.doc.page -= 1; loadDocumentView(); }
});
document.getElementById("doc-next").addEventListener("click", () => {
  if (state.doc.page < state.doc.pagesMeta.length) { state.doc.page += 1; loadDocumentView(); }
});

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
